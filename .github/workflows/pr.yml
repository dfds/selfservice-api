name: selfservice-api PR

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: selfservice-api-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out selfservice-api
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: make clean-restore-build

      - name: Test
        run: make tests
